<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Care</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="hero">

        <nav class="navbar navbar-expand-lg navbar-dark bg-dark bg-opacity-25">
            <div class="container">

                <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse"
                        data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="Page1.html">Accueil</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="tarif.html">Tarif</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="apropos.html">À propos</a>
                        </li>
                        

                        <li class="nav-item">
                <button
                    class="nav-link border-0 bg-transparent"
                    data-bs-toggle="modal"
                    data-bs-target="#inscriptionModal">
                    Inscription
                </button>
            </li>
               

                        <li class="nav-item">
                            <button
                                class="nav-link border-0 bg-transparent"
                                data-bs-toggle="modal"
                                data-bs-target="#connexionModal">
                                Connexion
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="overlay"></div>

        <div class="logo-container">
            <div class="text-center">

                <img src="images/logo.png" alt="Logo du site" class="mb-4">

                <div class="d-flex justify-content-center gap-5">

                    <button
                        type="button"
                        class="btn btn-connexion"
                        data-bs-toggle="modal"
                        data-bs-target="#connexionModal">
                        Connexion
                    </button>

                    <a href="lavage.html" class="btn btn-lavage">
                        Faire un lavage
                    </a>

                </div>

            </div>
        </div>

    </div>

    <!-- Modal Connexion -->
    <div class="modal fade" id="connexionModal" tabindex="-1" aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content auth-box">

                <div class="modal-body p-4">

                    <h2 class="text-center mb-4">
                        Authentification
                    </h2>

                    <div class="mb-3">
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Téléphone">
                    </div>

                    <button class="btn btn-auth">
                        Suivant
                    </button>

                </div>

            </div>

        </div>

    </div>


<!-- Modal Inscription -->
<div class="modal fade" id="inscriptionModal" tabindex="-1" aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content auth-box">

            <div class="modal-body p-4">

                <h1 class="text-center inscription-title">
                    CleanCare
                </h1>

                <h2 class="text-center mb-3">
                    Bienvenue
                </h2>

                <p class="text-center mb-4">
                    Veuillez vous connecter pour une expérience optimale.
                </p>

                <form>

                    <div class="mb-3">
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Nom">
                    </div>

                    <div class="mb-3">
                        <input
                            type="text"
                            class="form-control"
                            placeholder="Prénom">
                    </div>

                    <div class="mb-4">
                        <input
                            type="tel"
                            class="form-control"
                            placeholder="Téléphone">
                    </div>

                    <button class="btn btn-auth">
                        Suivant
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
